{% extends "base.html" %}

{% block title %}SN 매칭 관리 툴{% endblock %}

{% block header %}
<header class="hero">
    <div>
        <h1>아카라라이프 도어락 SN 입력 툴</h1>
    </div>
    <div class="summary-card">
        <span class="summary-label">오늘 등록 건수</span>
        <strong>{{ today_count }}</strong>
        <span class="summary-date">{{ today }}</span>
    </div>
</header>
{% endblock %}

{% block content %}
<main class="home-grid">
    <a href="/scan" class="home-card">
        <div class="home-card-icon scan-icon">&#9998;</div>
        <h2>생산 진행</h2>
        <p>SN 스캔 등록</p>
    </a>

    <a href="/search" class="home-card">
        <div class="home-card-icon search-icon">&#128269;</div>
        <h2>조회 및 다운로드</h2>
        <p>SN 검색, 날짜별 조회, 엑셀 다운로드</p>
    </a>

    <a href="/settings" class="home-card">
        <div class="home-card-icon settings-icon">&#9881;</div>
        <h2>Lumi SN 업로드</h2>
        <p>Lumi SN 목록 업로드</p>
    </a>
</main>
{% endblock %}
